# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# Set NEXT_PUBLIC_GOOGLE_CLIENT_ID (BUILD + RUNTIME) in Firebase Console → App Hosting → your backend,
# or define env: below. NEXT_PUBLIC_* must be available at BUILD for Next.js.
# env:
#   - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
#     value: xxx.apps.googleusercontent.com
#     availability:
#       - BUILD
#       - RUNTIME
#
# Grant access to secrets in Cloud Secret Manager:
# https://firebase.google.com/docs/app-hosting/configure#secret-parameters
